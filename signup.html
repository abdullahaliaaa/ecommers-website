<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Cara</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="header">
        <a href="home.html"><img src="images/logo.png" class="logo" alt=""></a>
        <div>
            <ul id="navbar">
                <li><a href="home.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="about.html">About</a></li>

    <section id="form-details" class="section-p1">
        <form id="signup-form">
            <span>JOIN US</span>
            <h2>Create Your Account</h2>
            <input type="text" id="user-name" placeholder="Your Full Name" required>
            <input type="email" id="user-email" placeholder="Your Email" required>
            <input type="password" id="user-pass" placeholder="Create Password" required>
            <button class="normal" type="submit">Sign Up</button>
            <p>Already have an account? <a href="login.html">Login here</a></p>
        </form>
    </section>

    <div id="toast">Message goes here</div>

    <script src="script.js"></script>
